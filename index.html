<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6c5ce7">
  <meta name="description" content="A pass-and-play chess PWA prototype.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Chess">

  <title>Chess · Pass-and-Play</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>

  <div class="app">

    <header class="header">
      <h1 class="header__title">Chess</h1>
      <p class="header__subtitle">Pass-and-Play Prototype</p>
    </header>

    <main class="main">

      <section class="screen" id="screen-game">
        <div class="card">

          <div class="capture-row" id="captureTop" aria-label="Pieces captured by top player"></div>

          <div class="tag-wrap">
            <span class="player-tag" id="tagTop">Black</span>
          </div>

          <div class="board-wrap">
            <div class="board" id="board" aria-label="Chess board" role="grid"></div>
          </div>

          <div class="tag-wrap">
            <span class="player-tag" id="tagBottom">White</span>
          </div>

          <div class="capture-row" id="captureBottom" aria-label="Pieces captured by bottom player"></div>

          <p class="status" id="gameStatus">White to move.</p>

          <div class="btn-row">
            <button class="btn btn--primary" id="btnNew">New Game</button>
            <button class="btn btn--secondary" id="btnUndo">Undo</button>
            <button class="btn btn--ghost" id="btnFlip">Flip</button>
          </div>

          <div class="history">
            <p class="label">Moves</p>
            <ol class="history__list" id="historyList"></ol>
          </div>
        </div>
      </section>

      <!-- Promotion picker -->
      <div class="modal" id="promoModal" hidden>
        <div class="modal__panel">
          <p class="modal__title">Promote pawn to</p>
          <div class="promo-row">
            <button class="promo-btn" data-promo="q" aria-label="Queen">&#9819;</button>
            <button class="promo-btn" data-promo="r" aria-label="Rook">&#9820;</button>
            <button class="promo-btn" data-promo="b" aria-label="Bishop">&#9821;</button>
            <button class="promo-btn" data-promo="n" aria-label="Knight">&#9822;</button>
          </div>
        </div>
      </div>

    </main>

    <footer class="footer">
      <p>v0.1.0 &nbsp;·&nbsp; Pass-and-Play</p>
      <p>Made by <span class="footer__author">ricardobertolin</span></p>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
